<style>
:root{

  --amber:#BA7517;--amber-l:#FAEEDA;
  --purple-l:#EEEDFE;--purple-d:#3C3489;

  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --r:10px;--rl:14px;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
    --green-l:#0a3d28;--green-d:#5DCAA5;--blue-l:#0a2540;--blue-d:#85B7EB;
    --red-l:#3d1a0e;--red-d:#F0997B;--amber-l:#3d2800;
    --purple-l:#1e1a4d;--purple-d:#AFA9EC;
  }

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);font-size:15px;padding-top:var(--st);}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#hdr{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px 10px;flex-shrink:0;}

.ni.active{color:var(--green);}
.ni.active.usd{color:var(--blue);}

.csw{display:flex;border:0.5px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.cb{flex:1;padding:10px;font-size:13px;cursor:pointer;border:none;background:var(--bg2);color:var(--text2);font-weight:400;transition:all .2s;font-family:inherit;}
.cb.a-ars{background:var(--green);color:#fff;font-weight:600;}
.cb.a-usd{background:var(--blue);color:#fff;font-weight:600;}

.hs{font-size:12px;color:var(--text2);margin-top:1px;}
.ms{padding:6px 10px;border-radius:8px;font-size:12px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:inherit;}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.mg3{grid-template-columns:repeat(3,1fr);}
.met{background:var(--bg2);border-radius:var(--r);padding:12px;}
.ml{font-size:11px;color:var(--text2);margin-bottom:3px;}
.mv{font-size:16px;font-weight:700;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:12px;}
.ct{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.fg label{font-size:12px;color:var(--text2);font-weight:500;}
.fg input,.fg select{width:100%;padding:11px 12px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:15px;font-family:inherit;-webkit-appearance:none;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--green);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{padding:13px 16px;border-radius:var(--r);font-size:15px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:inherit;font-weight:500;width:100%;transition:opacity .15s;}
.btn:active{opacity:.75;}
.bg{background:var(--green);color:#fff;border-color:var(--green);}
.bb{background:var(--blue);color:#fff;border-color:var(--blue);}
.bdel{color:var(--red);font-size:11px;padding:3px 7px;background:none;cursor:pointer;border-radius:6px;border:0.5px solid var(--red);font-family:inherit;}
.bdel:active{background:var(--red-l);}
.ti{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border);}

.tico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tn{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tm{font-size:12px;color:var(--text2);margin-top:2px;}
.tr{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.ta{font-size:14px;font-weight:600;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.bi{background:var(--green-l);color:var(--green-d);}
.be{background:var(--red-l);color:var(--red-d);}
.bc{background:var(--blue-l);color:var(--blue-d);}
.bq{background:var(--purple-l);color:var(--purple-d);}
.bok{background:var(--green-l);color:var(--green-d);}
.bsav{background:var(--amber-l);color:var(--amber);}
.frow{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.frow::-webkit-scrollbar{display:none;}
.filt{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);white-space:nowrap;font-family:inherit;font-weight:500;flex-shrink:0;}
.filt.active{background:var(--text);color:var(--bg);}
.ccg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:14px;}
.ccc{border-radius:14px;padding:14px;color:#fff;cursor:pointer;min-height:108px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .15s;}
.ccc:active{transform:scale(0.97);}
.chip{width:22px;height:16px;background:rgba(255,255,255,.4);border-radius:3px;margin-bottom:6px;}
.ccn{font-size:13px;font-weight:600;}
.ccd{font-size:10px;opacity:.7;margin-top:1px;}
.ccb{display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px;}
.ccs{font-size:15px;font-weight:700;}
.cci{font-size:10px;opacity:.75;text-align:right;line-height:1.4;}
.ccadd{border-radius:14px;padding:14px;border:1.5px dashed var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px;min-height:108px;font-family:inherit;}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s;}
.cdot.sel{border-color:var(--text);transform:scale(1.15);}
.crow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.pb{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:5px;}
.pf{height:100%;border-radius:3px;transition:width .4s;}
.seg{display:flex;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:14px;}

.sl{flex:1;}.sr{text-align:right;}
.cb2{border:0.5px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;}

.cn{font-size:14px;font-weight:600;}
.csb{font-size:12px;color:var(--text2);margin-top:1px;}
.mb{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px;max-width:100px;}
.mf{height:100%;border-radius:2px;}
.ctot{font-size:14px;font-weight:700;color:var(--red);flex-shrink:0;}
.carr{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;margin-left:6px;}
.carr.open{transform:rotate(90deg);}
.ctx{display:none;border-top:0.5px solid var(--border);background:var(--bg2);}
.ctx.open{display:block;}
.ctx-r{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:13px;}
.ctx-r:last-child{border-bottom:none;}
.ctx-d{flex:1;color:var(--text);}
.ctx-dt{color:var(--text2);flex-shrink:0;}
.ctx-a{font-weight:600;color:var(--red);flex-shrink:0;margin:0 6px;}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:2rem 0;}
.prev{font-size:13px;color:var(--text2);padding:10px 12px;background:var(--bg2);border-radius:var(--r);margin-bottom:10px;border:0.5px solid var(--border);}
.cpill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:6px 12px;background:var(--bg2);border-radius:20px;margin-bottom:14px;}
.back{display:flex;align-items:center;gap:5px;color:var(--green);font-size:15px;font-weight:500;background:none;border:none;cursor:pointer;padding:0 0 14px 0;font-family:inherit;}
.cw{position:relative;width:100%;height:175px;}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:12px;color:var(--text2);}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* SYNC */
.sbar{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 10px;border-radius:20px;margin-bottom:12px;width:fit-content;}
.sok{background:var(--green-l);color:var(--green-d);}
.sload{background:var(--amber-l);color:var(--amber);}
.serr{background:var(--red-l);color:var(--red-d);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dok{background:var(--green);}
.dload{background:var(--amber);animation:pulse 1s infinite;}
.derr{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* LOADING */
#lov{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#lov p{font-size:14px;color:var(--text2);}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

const SCRIPT = "https://script.google.com/macros/s/AKfycbx_8QgKsVmRv5KI1Hs5xpTus-pze5sxl9LlRcJYPAD1LI2tnBTrLl87sd55Bph-Pbl8/exec";

const CAT_C=["#1D9E75","#D85A30","#378ADD","#BA7517","#993556","#3B6D11","#534AB7","#D4537E","#5F5E5A","#639922","#EF9F27","#0F6E56"];

];

const UEXP=[{id:"Viajes",i:"✈️"},{id:"Suscripciones",i:"📱"},{id:"Importaciones",i:"📦"},{id:"Servicios ext.",i:"🌐"},{id:"Ropa",i:"👕"},{id:"Tecnología",i:"💻"},{id:"Otro",i:"📌"}];

function icon(n){ return (ALLC.find(c=>c.id===n)||{i:"📌"}).i; }
function catCol(n){ const cats=cur==="ARS"?EXP:UEXP; const i=cats.findIndex(c=>c.id===n); return CAT_C[i>=0?i%CAT_C.length:0]; }
function fmtInput(el){
  const oldLen=el.value.length;
  const sel=el.selectionStart;
  let raw=el.value.replace(/[^0-9,]/g,'');
  const partes=raw.split(',');
  let entero=partes[0]||'';
  let decimal=partes.length>1?','+partes[1].slice(0,2):'';
  let result='';
  for(let i=0;i<entero.length;i++){
    if(i>0&&(entero.length-i)%3===0) result+='.';
    result+=entero[i];
  }
  el.value=result+decimal;
  const diff=el.value.length-oldLen;
  const np=Math.max(0,sel+diff);
  try{el.setSelectionRange(np,np);}catch(e){}
}
function getRawValue(id){

function fmtN(n){ return Math.round(n).toLocaleString("es-AR"); }

// ── LEER VIA APPS SCRIPT (GET) ──
async function scriptRead(sheet){
  try{
    const url=SCRIPT+"?sheet="+encodeURIComponent(sheet);
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),15000);
    const r=await fetch(url,{
      redirect:"follow",
      signal:ctrl.signal,
      credentials:"omit",
      cache:"no-cache"
    });
    clearTimeout(timer);
    const text=await r.text();
    if(!text||text.trim()==="") return [];
    const d=JSON.parse(text);
    if(d.error) return [];
    return d.values||[];
  }catch(e){
    console.warn("scriptRead error for",sheet,":",e.message);
    return [];
  }
}

// ── ESCRIBIR VIA APPS SCRIPT (POST) ──
async function scriptPost(action, sheet, data){
  const r=await fetch(SCRIPT,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action,sheet,...data})
  });
  if(!r.ok) throw new Error("Error "+r.status);
  return r.json();
}

// ── LOCAL CACHE UPDATE (evita recargar todo el sheet) ──
function addToCache(collection, row, parser){
  // Crear objeto parseado desde la fila y agregarlo al cache local
  const header = collection === db.movARS ? ["ID","FECHA","TIPO","CATEGORIA","DESCRIPCION","MONTO","TARJETA_ID","CUOTAS","NUM_CUOTA","MES","NOTAS"] :
                 collection === db.movUSD ? ["ID","FECHA","TIPO","CATEGORIA","DESCRIPCION","MONTO","MES","NOTAS","TID","CUOTAS","NC"] :
                 collection === db.sav ? ["ID","FECHA","TIPO_MOV","DONDE","DESC","MONTO","MES"] :
                 ["ID","NOMBRE","DIGITOS","LIMITE","DIA_CIERRE","DIA_VNC","BANCO","COLOR"];
  const fakeRows = [header, row];
  const parsed = parser(fakeRows);
  if(parsed.length > 0){
    parsed[0]._row = collection.length + 2;
    collection.push(parsed[0]);
  }
}
function syncBackground(){
  // Resincronizar en background sin bloquear UI
  setTimeout(()=>{
    loadAll().then(()=>renderAll()).catch(e=>console.warn("Background sync error:",e));
  }, 2000);
}

function toFecha(v){
  if(!v) return "";
  if(v instanceof Date) return v.toISOString().slice(0,10);
  if(typeof v==="number"){ const d=new Date((v-25569)*86400*1000); return d.toISOString().slice(0,10); }
  const s=String(v);
  if(s.includes("T")) return s.slice(0,10);
  return s;
}
function toMes(mesVal, fecha){
  let m=String(mesVal||"").trim().replace(/\.0+$/,"");
  if(m&&m.length===6) return m;
  if(fecha&&fecha.length>=7) return fecha.replace(/-/g,"").slice(0,6);
  return "";
}
function pMovARS(rows){
  return rows.slice(1).filter(r=>r[0]).map((r,i)=>{
    const cuotas=parseInt(r[7])||1;
    const fecha=toFecha(r[1]);
    const mes=toMes(r[9],fecha);
    return { _row:i+2,id:r[0]||"",fecha,tipo:r[2]||"",cat:r[3]||"",
      desc:r[4]||"",monto:parseFloat(r[5])||0,tid:r[6]||"",
      cuotas,nc:parseInt(r[8])||1,mes,notas:r[10]||"" };
  });
}
function pTars(rows){
  return rows.slice(1).filter(r=>r[0]).map((r,i)=>{
    return { _row:i+2,id:r[0]||"",nombre:r[1]||"",dig:r[2]||"",
      lim:parseFloat(r[3])||0,cierre:parseInt(r[4])||20,
      venc:parseInt(r[5])||10,banco:r[6]||"",color:r[7]||"#1D4E89" };
  });
}
function pMovUSD(rows){
  return rows.slice(1).filter(r=>r[0]).map((r,i)=>{
    const fecha=toFecha(r[1]);
    const mes=toMes(r[6],fecha);
    return { _row:i+2,id:r[0]||"",fecha,tipo:r[2]||"",cat:r[3]||"",
      desc:r[4]||"",monto:parseFloat(r[5])||0,mes,notas:r[7]||"",
      tid:r[8]||"",cuotas:parseInt(r[9])||1,nc:parseInt(r[10])||1 };
  });
}
function pSav(rows){
  return rows.slice(1).filter(r=>r[0]).map((r,i)=>{
    const fecha=toFecha(r[1]);
    const mes=toMes(r[6],fecha);
    return { _row:i+2,id:r[0]||"",fecha,tmov:r[2]||"",
      donde:r[3]||"",desc:r[4]||"",monto:parseFloat(r[5])||0,mes };
  });
}

async function loadAll(){
  setSS("load","Sincronizando...");
  try {
    // Una sola request para todas las hojas
    const url = SCRIPT + "?all=1";
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 20000);
    const r = await fetch(url, {
      redirect:"follow",
      signal:ctrl.signal,
      credentials:"omit",
      cache:"no-cache"
    });
    clearTimeout(timer);
    const text = await r.text();
    const d = JSON.parse(text);
    if(d.all){
      // Respuesta unificada - todo en una request
      const all = d.all;
      db.movARS  = pMovARS(all["Movimientos_ARS"]||[]);
      db.tars    = pTars(all["Tarjetas_ARS"]||[]);
      db.movUSD  = pMovUSD(all["Movimientos_USD"]||[]);
      db.sav     = pSav(all["Ahorros_USD"]||[]);
      db.tarsUSD = pTars(all["Tarjetas_USD"]||[]);
    } else if(d.values){
      // Fallback: respuesta individual
      db.movARS = pMovARS(d.values);
    }
    console.log("Cargados:",db.movARS.length,"movARS,",db.tars.length,"tars,",db.movUSD.length,"movUSD");
    setSS("ok","Sincronizado ✓ ("+db.movARS.length+" mov)");
  } catch(e){ setSS("err","Sin conexión"); console.error(e); throw e; }
}

// ── MESES ──
function getMonths(){
  const s=new Set();
  [...db.movARS,...db.movUSD,...db.sav].forEach(t=>{if(t.mes)s.add(t.mes);});
  const now=new Date();
  s.add(now.getFullYear()+String(now.getMonth()+1).padStart(2,"0"));
  return[...s].sort().reverse();
}
function getCM(){ return document.getElementById("gm").value||getMonths()[0]||""; }
function fmtM(m){
  if(!m||m.length<6) return m;
  const n=new Date(parseInt(m.slice(0,4)),parseInt(m.slice(4,6))-1,1).toLocaleString("es",{month:"long",year:"numeric"});
  return n.charAt(0).toUpperCase()+n.slice(1);
}
function initMS(){
  const sel=document.getElementById("gm"),months=getMonths(),cv=sel.value;
  sel.innerHTML=months.map(m=>`<option value="${m}">${fmtM(m)}</option>`).join("");

// ── TARJETAS HELPERS ──
function cSpent(id,m){ return db.movARS.filter(t=>t.tid===id&&t.mes===m).reduce((a,t)=>a+t.monto,0); }
function cCuotas(id,m){
  const[y,mo]=[parseInt(m.slice(0,4)),parseInt(m.slice(4,6))];
  return db.movARS.filter(t=>{
    if(t.tid!==id||t.cuotas<=1) return false;
    const fd=new Date(t.fecha+"T12:00:00");
    const cm=fd.getFullYear()*12+fd.getMonth(),tm=y*12+(mo-1);
    return tm>=cm&&tm<cm+t.cuotas;
  });
}

async function delRow(row, sheet){
  if(!confirm("¿Eliminar este movimiento?")) return;
  setSS("load","Eliminando...");
  try{
    await scriptPost("delete",sheet,{row});
    // Actualizar cache local
    if(sheet===SH.movARS) db.movARS=db.movARS.filter(t=>t._row!==row);
    else if(sheet===SH.movUSD) db.movUSD=db.movUSD.filter(t=>t._row!==row);
    else if(sheet===SH.sav) db.sav=db.sav.filter(t=>t._row!==row);
    // Reindexar _row
    const col = sheet===SH.movARS?db.movARS:sheet===SH.movUSD?db.movUSD:db.sav;
    col.forEach((t,i)=>{ if(t._row>row) t._row--; });
    setSS("ok","Sincronizado ✓");
    renderAll(); toast("🗑️ Eliminado");
    syncBackground();
  } catch(e){ setSS("err","Error al eliminar"); toast("❌ Error: "+e.message); }
}

// ── DETALLES ──
function rDet(){
  const m=getCM(),txs=getTxs(m);
  const bycat={};
  txs.filter(t=>t.tipo==="Gasto"||t.tipo==="Tarjeta").forEach(t=>{
    if(!bycat[t.cat]) bycat[t.cat]=[];
    bycat[t.cat].push(t);
  });
  const tot=Object.values(bycat).flat().reduce((a,t)=>a+t.monto,0);
  const months=getMonths(),idx=months.indexOf(m),prevM=months[idx+1];
  let prevTot=0;
  if(prevM){ const pt=D().filter(t=>t.mes===prevM); prevTot=pt.filter(t=>t.tipo==="Gasto"||t.tipo==="Tarjeta").reduce((a,t)=>a+t.monto,0); }
  const diff=tot-prevTot,diffP=prevTot>0?((diff/prevTot)*100).toFixed(1):null;
  const sorted=Object.entries(bycat).sort((a,b)=>b[1].reduce((x,t)=>x+t.monto,0)-a[1].reduce((x,t)=>x+t.monto,0));
  const blocks=sorted.map(([cat,tlist])=>{
    const total=tlist.reduce((a,t)=>a+t.monto,0);
    const pct=tot>0?(total/tot*100).toFixed(1):0;
    const col=catCol(cat),isOpen=openC[cat+m];
    const txsH=tlist.sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(t=>{
      const d=new Date(t.fecha+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"short"});
      const cc=t.tipo==="Tarjeta"?getCC(t.tid):null;
      const badge=cc?`<span class="badge bc">${cc.nombre}</span>${t.cuotas>1?`<span class="badge bq">${t.cuotas}c</span>`:""}`:"";
      return`<div class="ctx-r"><span class="ctx-d">${t.desc||cat} ${badge}</span>
        <span class="ctx-dt">${d}</span><span class="ctx-a">${fmt(t.monto)}</span>
        <button class="bdel" onclick="delRow(${t._row},'${cur==="ARS"?SH.movARS:SH.movUSD}')">✕</button></div>`;
    }).join("");
    return`<div class="cb2"><div class="ch" onclick="togCat('${cat+m}')">
      <div class="ci" style="background:${col}22">${icon(cat)}</div>
      <div style="flex:1;min-width:0"><div class="cn">${cat}</div>
        <div class="csb">${tlist.length} gasto${tlist.length>1?"s":""} · ${pct}% del total</div>
        <div class="mb"><div class="mf" style="width:${pct}%;background:${col}"></div></div></div>
      <div class="ctot">${fmtS(total)}</div>
      <div class="carr${isOpen?" open":""}" id="arr-${cat+m}">▶</div></div>
      <div class="ctx${isOpen?" open":""}" id="ctx-${cat+m}">${txsH}</div></div>`;
  }).join("");
  setC(`${sbar()}
    <div class="mg">
      <div class="met"><div class="ml">Total gastado</div><div class="mv" style="color:var(--red)">${fmtS(tot)}</div></div>
      <div class="met"><div class="ml">Categorías</div><div class="mv">${Object.keys(bycat).length}</div></div>
    </div>
    ${diffP?`<div class="cpill">Vs mes ant: <strong style="color:${diff>0?"var(--red)":"var(--green)"}">${diff>0?"▲":"▼"} ${Math.abs(diff).toLocaleString("es-AR",{maximumFractionDigits:0})} (${diffP}%)</strong></div>`:""}
    <p style="font-size:12px;color:var(--text2);margin-bottom:10px;">Tocá cada categoría para ver el detalle</p>
    ${sorted.length?blocks:"<p class='empty'>Sin gastos este mes</p>"}
  `);
}

  document.getElementById("arr-"+k)?.classList.toggle("open",openC[k]);

async function addCard(){

function getCCusd(id){ return db.tarsUSD.find(c=>c.id===id); }
function cSpentUSD(id,m){ return db.movUSD.filter(t=>t.tid===id&&t.mes===m).reduce((a,t)=>a+t.monto,0); }
function cCuotasUSD(id,m){
  const[y,mo]=[parseInt(m.slice(0,4)),parseInt(m.slice(4,6))];
  return db.movUSD.filter(t=>{
    if(t.tid!==id||!t.cuotas||t.cuotas<=1)return false;
    const fd=new Date(t.fecha+"T12:00:00");
    const cm=fd.getFullYear()*12+fd.getMonth(),tm=y*12+(mo-1);
    return tm>=cm&&tm<cm+t.cuotas;
  });
}

  const cat=document.getElementById("txcat").value;
  const desc=document.getElementById("txdc").value.trim();
  if(!am||!dt){ alert("Completá monto y fecha"); return; }
  const mes=calcMes(dt);
  setSS("load","Guardando...");
  try{
    if(tipo==="Tarjeta"){
      const cardId=document.getElementById("txcard").value;
      if(!cardId){ alert("Agregá una tarjeta primero"); return; }
      const pago=document.getElementById("txpago").value;
      const cuotas=pago==="q"?Math.max(2,parseInt(document.getElementById("txq").value)||2):1;
      const shTar=cur==="ARS"?SH.movARS:SH.movUSD;
      if(cuotas>1){
        const mC=am/cuotas;
        const fd=new Date(dt+"T12:00:00");
        for(let i=1;i<=cuotas;i++){
          const cd=new Date(fd.getFullYear(),fd.getMonth()+(i-1),fd.getDate());
          const cs=cd.toISOString().slice(0,10);
          const cm=calcMes(cs);
          let r;
          if(cur==="ARS") r=[uid("ARS"),cs,"Tarjeta",cat,`${desc||cat} - cuota ${i}/${cuotas}`,mC,cardId,cuotas,i,cm,""];
          else r=[uid("USD"),cs,"Tarjeta",cat,`${desc||cat} - cuota ${i}/${cuotas}`,mC,cm,"",cardId,cuotas,i];
          await scriptPost("append",shTar,{row:r});
        }
        initMS();renderAll();toast(`✅ ${cuotas} cuotas guardadas`);goto("inicio");syncBackground(); return;
      }
      let rowTar;
      if(cur==="ARS") rowTar=[uid("ARS"),dt,"Tarjeta",cat,desc,am,cardId,1,1,mes,""];
      else rowTar=[uid("USD"),dt,"Tarjeta",cat,desc,am,mes,"",cardId,1,1];
      await scriptPost("append",shTar,{row:rowTar});
    } else {
      const sh=cur==="ARS"?SH.movARS:SH.movUSD;
      const row=cur==="ARS"?[uid("ARS"),dt,tipo,cat,desc,am,"",1,1,mes,""]:[uid("USD"),dt,tipo,cat,desc,am,mes,""];
      await scriptPost("append",sh,{row});
    }
    initMS();renderAll();toast("✅ Guardado");goto("inicio");
    syncBackground();
  } catch(e){ setSS("err","Error"); toast("❌ "+e.message); }
}

async function init(){
  // 1. Mostrar cache local inmediatamente si existe
  try{
    const cached = localStorage.getItem("finanzas_cache");
    if(cached){
      const parsed = JSON.parse(cached);
      if(parsed.movARS && parsed.movARS.length > 0){
        db.movARS  = parsed.movARS||[];
        db.tars    = parsed.tars||[];
        db.movUSD  = parsed.movUSD||[];
        db.sav     = parsed.sav||[];
        db.tarsUSD = parsed.tarsUSD||[];
        initMS(); renderAll();
        document.getElementById("lov").style.display="none";
        document.getElementById("app").style.display="flex";
        setSS("load","Actualizando desde Google Sheets...");
      }
    }
  } catch(e){ console.warn("Cache read error:", e); }

  // 2. Siempre cargar datos frescos del Sheet
  try{
    await loadAll();
    // Guardar cache actualizado
    try{
      localStorage.setItem("finanzas_cache", JSON.stringify({
        movARS:db.movARS, tars:db.tars,
        movUSD:db.movUSD, sav:db.sav, tarsUSD:db.tarsUSD
      }));
    } catch(e){ console.warn("Cache write:", e); }
    initMS(); renderAll();
    document.getElementById("lov").style.display="none";
    document.getElementById("app").style.display="flex";
  } catch(e){
    console.error("Init error:", e);
    if(document.getElementById("app").style.display==="flex"){
      setSS("err","Sin conexión — mostrando datos guardados");
    } else {
      document.getElementById("lov").innerHTML=`
        <p style="color:var(--red);text-align:center;padding:20px;line-height:1.6;">
          ❌ Error al conectar con Google Sheets.<br><br>
          <button onclick="init()" style="padding:12px 24px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer;">🔄 Reintentar</button>
        </p>`;
    }
  }
}
init();
</script>
</body>
</html>
